<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 Hearts</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0d0008;
    --pink-1: #ff2d78;
    --pink-2: #ff6eb4;
    --pink-3: #ffb3d9;
    --pink-4: #ff4fa3;
    --violet: #c92b8c;
    --deep: #6e003a;
    --white: #fff0f5;
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    overflow: hidden;
    cursor: none;
    font-family: 'Lato', sans-serif;
    color: var(--white);
  }

  /* Gradient background orbs */
  .bg-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
    animation: orbFloat 8s ease-in-out infinite;
  }
  .bg-orb.a { width: 500px; height: 500px; background: radial-gradient(circle, #6e003a88, transparent); top: -100px; left: -100px; animation-delay: 0s; }
  .bg-orb.b { width: 400px; height: 400px; background: radial-gradient(circle, #c92b8c55, transparent); top: 40%; right: -80px; animation-delay: -3s; }
  .bg-orb.c { width: 350px; height: 350px; background: radial-gradient(circle, #ff2d7833, transparent); bottom: -60px; left: 30%; animation-delay: -5s; }

  @keyframes orbFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -40px) scale(1.05); }
    66% { transform: translate(-20px, 20px) scale(0.95); }
  }

  /* Canvas for particle hearts */
  #canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
    pointer-events: none;
  }

  /* Center content */
  .center {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    text-align: center;
    pointer-events: none;
    user-select: none;
  }

  .big-heart {
    font-size: 120px;
    line-height: 1;
    display: block;
    animation: bigPulse 1.6s ease-in-out infinite;
    filter: drop-shadow(0 0 40px #ff2d78cc);
  }

  @keyframes bigPulse {
    0%, 100% { transform: scale(1); filter: drop-shadow(0 0 40px #ff2d78cc); }
    50% { transform: scale(1.12); filter: drop-shadow(0 0 70px #ff6eb4ff); }
  }

  .title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 4rem);
    font-weight: 700;
    background: linear-gradient(135deg, var(--pink-3), var(--pink-1), var(--violet));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-top: 16px;
    letter-spacing: 0.04em;
  }

  .subtitle {
    font-size: 1rem;
    font-weight: 300;
    color: var(--pink-3);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-top: 8px;
    opacity: 0.75;
  }

  /* Click hint */
  .hint {
    position: fixed;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-size: 0.8rem;
    color: var(--pink-3);
    opacity: 0.5;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    animation: fadeHint 3s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes fadeHint {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.7; }
  }

  /* Custom cursor */
  #cursor {
    position: fixed;
    width: 28px; height: 28px;
    pointer-events: none;
    z-index: 9999;
    font-size: 22px;
    transform: translate(-50%, -50%);
    transition: transform 0.08s ease;
    will-change: transform;
  }

  /* Floating static hearts in the background */
  .float-heart {
    position: fixed;
    pointer-events: none;
    z-index: 2;
    animation: floatUp linear infinite;
    opacity: 0;
  }

  @keyframes floatUp {
    0% { transform: translateY(110vh) rotate(0deg) scale(0.5); opacity: 0; }
    10% { opacity: 0.8; }
    90% { opacity: 0.3; }
    100% { transform: translateY(-20vh) rotate(360deg) scale(1.2); opacity: 0; }
  }

  /* Click burst hearts */
  .burst-heart {
    position: fixed;
    pointer-events: none;
    z-index: 100;
    font-size: 28px;
    animation: burstOut 0.9s ease-out forwards;
  }

  @keyframes burstOut {
    0% { opacity: 1; transform: translate(0, 0) scale(0.5); }
    60% { opacity: 0.9; }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(1.4); }
  }

  /* 10번 클릭 메시지 */
  #love-message {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 999;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    background: rgba(13, 0, 8, 0.7);
    backdrop-filter: blur(6px);
  }
  #love-message.show {
    display: flex;
    animation: msgFadeIn 0.5s ease forwards;
  }
  @keyframes msgFadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .msg-hearts {
    font-size: 80px;
    animation: msgHeartPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  }
  @keyframes msgHeartPop {
    0% { transform: scale(0); }
    70% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }
  .msg-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 8vw, 6rem);
    font-weight: 700;
    background: linear-gradient(135deg, #ffb3d9, #ff2d78, #c92b8c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-top: 20px;
    opacity: 0;
    animation: msgTextSlide 0.7s 0.3s ease forwards;
    text-align: center;
    filter: drop-shadow(0 0 30px #ff2d78aa);
  }
  @keyframes msgTextSlide {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg-close {
    margin-top: 40px;
    opacity: 0;
    animation: msgTextSlide 0.7s 0.7s ease forwards;
    font-size: 0.85rem;
    color: #ffb3d9;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    cursor: pointer;
    pointer-events: all;
    border: 1px solid #ff2d7866;
    padding: 10px 28px;
    border-radius: 50px;
    transition: background 0.2s, border-color 0.2s;
  }
  .msg-close:hover {
    background: #ff2d7822;
    border-color: #ff2d78;
  }

  /* 카운터 표시 */
  #click-counter {
    position: fixed;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    gap: 6px;
    pointer-events: none;
  }
  .counter-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #ff2d7844;
    border: 1px solid #ff2d7888;
    transition: background 0.3s, transform 0.3s;
  }
  .counter-dot.filled {
    background: #ff2d78;
    border-color: #ff6eb4;
    transform: scale(1.3);
    box-shadow: 0 0 8px #ff2d78;
  }

  /* 하트 천사 */
  #heart-angel {
    display: none;
    position: fixed;
    font-size: 52px;
    z-index: 500;
    cursor: none;
    pointer-events: all;
    user-select: none;
    filter: drop-shadow(0 0 16px #ff6eb4cc);
    transition: filter 0.2s;
    will-change: transform;
  }
  #heart-angel.active {
    display: block;
    animation: angelAppear 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  }
  @keyframes angelAppear {
    from { transform: scale(0) rotate(-20deg); opacity: 0; }
    to   { transform: scale(1) rotate(0deg);  opacity: 1; }
  }
  #angel-hint {
    display: none;
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 501;
    font-size: 0.78rem;
    color: #ffb3d9;
    letter-spacing: 0.2em;
    opacity: 0.6;
    pointer-events: none;
    animation: fadeHint 2.5s ease-in-out infinite;
    white-space: nowrap;
  }
  #angel-hint.active { display: block; }

</style>
</head>
<body>

<div class="bg-orb a"></div>
<div class="bg-orb b"></div>
<div class="bg-orb c"></div>

<canvas id="canvas"></canvas>

<div id="cursor">💗</div>

<div class="center">
  <span class="big-heart">💖</span>
  <div class="title">Love is Everywhere</div>
  <div class="subtitle">클릭하면 하트가 터져요 ✨</div>
</div>

<div class="hint">♥ Click anywhere ♥</div>

<!-- 10번 클릭 메시지 -->
<div id="love-message">
  <div class="msg-hearts">💖💕💖</div>
  <div class="msg-text">오라방 사랑해 💗</div>
  <div class="msg-close" onclick="closeMessage()">닫기 ✕</div>
</div>

<!-- 클릭 카운터 도트 -->
<div id="click-counter">
  <div class="counter-dot" id="dot-1"></div>
  <div class="counter-dot" id="dot-2"></div>
  <div class="counter-dot" id="dot-3"></div>
  <div class="counter-dot" id="dot-4"></div>
  <div class="counter-dot" id="dot-5"></div>
  <div class="counter-dot" id="dot-6"></div>
  <div class="counter-dot" id="dot-7"></div>
  <div class="counter-dot" id="dot-8"></div>
  <div class="counter-dot" id="dot-9"></div>
  <div class="counter-dot" id="dot-10"></div>
</div>

<!-- 하트 천사 -->
<div id="heart-angel">👼💖</div>
<div id="angel-hint">하트천사를 잡으면 매일매일 쩩쮸💕</div>



<script>
  // Custom cursor
  const cursor = document.getElementById('cursor');
  const cursorHearts = ['💗','💕','💓','💞','💖','❤️','🩷'];
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
  });

  // Canvas particle hearts
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });

  const particles = [];
  const HEART_CHARS = ['♥','♡','❤','💕','💗','💖'];
  const COLORS = ['#ff2d78','#ff6eb4','#ffb3d9','#c92b8c','#ff4fa3','#ff91cc','#e0005e'];

  class Particle {
    constructor(x, y, fromClick) {
      this.x = x ?? Math.random() * canvas.width;
      this.y = y ?? canvas.height + 20;
      this.size = fromClick ? (16 + Math.random() * 24) : (10 + Math.random() * 20);
      this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
      this.char = HEART_CHARS[Math.floor(Math.random() * HEART_CHARS.length)];
      this.vx = (Math.random() - 0.5) * (fromClick ? 4 : 1.5);
      this.vy = fromClick ? -(3 + Math.random() * 5) : -(0.5 + Math.random() * 1.5);
      this.alpha = 1;
      this.rotation = Math.random() * Math.PI * 2;
      this.rotSpeed = (Math.random() - 0.5) * 0.08;
      this.fromClick = fromClick;
      this.life = fromClick ? 0.012 : 0.004;
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      this.alpha -= this.life;
      this.rotation += this.rotSpeed;
      if (!this.fromClick) this.vx += (Math.random() - 0.5) * 0.05;
    }
    draw() {
      ctx.save();
      ctx.globalAlpha = Math.max(0, this.alpha);
      ctx.fillStyle = this.color;
      ctx.font = `${this.size}px serif`;
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rotation);
      ctx.fillText(this.char, -this.size / 2, this.size / 2);
      ctx.restore();
    }
  }

  // Spawn ambient particles
  function spawnAmbient() {
    if (particles.length < 80) {
      particles.push(new Particle());
    }
  }
  setInterval(spawnAmbient, 200);

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = particles.length - 1; i >= 0; i--) {
      particles[i].update();
      particles[i].draw();
      if (particles[i].alpha <= 0) particles.splice(i, 1);
    }
    requestAnimationFrame(animate);
  }
  animate();

  // Click: burst hearts
  let clickCount = 0;
  const TRIGGER = 10;

  function closeMessage() {
    document.getElementById('love-message').classList.remove('show');
    clickCount = 0;
    for (let i = 1; i <= 10; i++) document.getElementById('dot-' + i).classList.remove('filled');
    // 닫기 누르면 천사 등장!
    setTimeout(spawnAngel, 300);
  }

  // ── 하트 천사 로직 ──────────────────────────────
  let angelActive = false;
  let ax = 200, ay = 200;      // 천사 위치
  let avx = 2.5, avy = -2;    // 천사 속도
  let mouseX = -999, mouseY = -999;
  let angelRaf = null;

  const angel = document.getElementById('heart-angel');
  const angelHint = document.getElementById('angel-hint');
  const FLEE_RADIUS = 280;  // 마우스 이 거리 안에 오면 도망
  const ANGEL_SPEED = 13;

  document.addEventListener('mousemove', e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });

  function spawnAngel() {
    ax = window.innerWidth / 2;
    ay = window.innerHeight / 2;
    avx = 3; avy = -2.5;
    angel.style.left = ax + 'px';
    angel.style.top  = ay + 'px';
    angel.classList.add('active');
    angelHint.classList.add('active');
    angelActive = true;
    angelLoop();
  }

  function angelLoop() {
    if (!angelActive) return;

    const W = window.innerWidth;
    const H = window.innerHeight;
    const SIZE = 56;

    // 마우스와 거리 계산
    const dx = ax - mouseX;
    const dy = ay - mouseY;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < FLEE_RADIUS) {
      // 도망! 마우스 반대 방향으로 강하게 가속
      const flee = (FLEE_RADIUS - dist) / FLEE_RADIUS; // 0~1
      const nx = dx / (dist || 1);
      const ny = dy / (dist || 1);
      avx += nx * flee * 5.0;
      avy += ny * flee * 5.0;
      // 이모지 흔들림 표현
      angel.style.filter = `drop-shadow(0 0 ${20 + flee*30}px #ff2d78) rotate(${(avx*5).toFixed(1)}deg)`;
    } else {
      // 자연스러운 방랑
      avx += (Math.random() - 0.5) * 0.4;
      avy += (Math.random() - 0.5) * 0.4;
      angel.style.filter = 'drop-shadow(0 0 16px #ff6eb4cc)';
    }

    // 속도 제한
    const speed = Math.sqrt(avx * avx + avy * avy);
    if (speed > ANGEL_SPEED) {
      avx = (avx / speed) * ANGEL_SPEED;
      avy = (avy / speed) * ANGEL_SPEED;
    }
    // 최소 속도 (멈추지 않게)
    if (speed < 1.2) {
      avx += (Math.random() - 0.5) * 1.5;
      avy += (Math.random() - 0.5) * 1.5;
    }

    ax += avx;
    ay += avy;

    // 벽 반사
    if (ax < 10)       { ax = 10;       avx = Math.abs(avx); }
    if (ax > W - SIZE) { ax = W - SIZE; avx = -Math.abs(avx); }
    if (ay < 10)       { ay = 10;       avy = Math.abs(avy); }
    if (ay > H - SIZE) { ay = H - SIZE; avy = -Math.abs(avy); }

    angel.style.left = ax + 'px';
    angel.style.top  = ay + 'px';

    angelRaf = requestAnimationFrame(angelLoop);
  }

  // 천사는 절대 못 잡음 - pointer-events none으로 클릭 불가
  angel.style.pointerEvents = 'none';

  function triggerLoveMessage() {
    // 대폭발 파티클
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2;
    for (let i = 0; i < 60; i++) {
      const p = new Particle(cx + (Math.random()-0.5)*200, cy + (Math.random()-0.5)*200, true);
      p.vx *= 2.5;
      p.vy *= 2.5;
      p.size *= 1.5;
      particles.push(p);
    }
    // DOM 폭발 하트
    for (let i = 0; i < 20; i++) {
      const el = document.createElement('div');
      el.className = 'burst-heart';
      const angle = (i / 20) * Math.PI * 2;
      const dist = 80 + Math.random() * 160;
      el.style.left = cx + 'px';
      el.style.top = cy + 'px';
      el.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
      el.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
      el.textContent = cursorHearts[Math.floor(Math.random() * cursorHearts.length)];
      el.style.fontSize = (24 + Math.random() * 28) + 'px';
      el.style.animationDuration = '1.2s';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1300);
    }
    setTimeout(() => {
      document.getElementById('love-message').classList.add('show');
    }, 400);
  }

  document.addEventListener('click', e => {
    // 메시지 화면 떠 있으면 무시
    if (document.getElementById('love-message').classList.contains('show')) return;

    clickCount++;
    if (clickCount <= 10) {
      document.getElementById('dot-' + clickCount).classList.add('filled');
    }
    if (clickCount === TRIGGER) {
      triggerLoveMessage();
      return;
    }

    const count = 14;
    for (let i = 0; i < count; i++) {
      particles.push(new Particle(e.clientX, e.clientY, true));
    }
    // DOM burst hearts
    for (let i = 0; i < 8; i++) {
      const el = document.createElement('div');
      el.className = 'burst-heart';
      const angle = (i / 8) * Math.PI * 2;
      const dist = 60 + Math.random() * 60;
      el.style.left = e.clientX + 'px';
      el.style.top = e.clientY + 'px';
      el.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
      el.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
      el.textContent = cursorHearts[Math.floor(Math.random() * cursorHearts.length)];
      el.style.fontSize = (18 + Math.random() * 20) + 'px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 950);
    }
    // Cursor change momentarily
    cursor.textContent = cursorHearts[Math.floor(Math.random() * cursorHearts.length)];
    cursor.style.transform = 'translate(-50%,-50%) scale(1.6)';
    setTimeout(() => {
      cursor.style.transform = 'translate(-50%,-50%) scale(1)';
      cursor.textContent = '💗';
    }, 300);
  });

  // Floating DOM hearts (behind canvas)
  const floatEmojis = ['💖','💗','💕','💓','💞','❤️','🩷','💝','💘','💟'];
  function spawnFloatHeart() {
    const el = document.createElement('div');
    el.className = 'float-heart';
    el.textContent = floatEmojis[Math.floor(Math.random() * floatEmojis.length)];
    const size = 14 + Math.random() * 30;
    el.style.fontSize = size + 'px';
    el.style.left = Math.random() * 100 + 'vw';
    const dur = 8 + Math.random() * 12;
    el.style.animationDuration = dur + 's';
    el.style.animationDelay = '0s';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), dur * 1000);
  }
  setInterval(spawnFloatHeart, 400);

  // Spawn a few immediately
  for (let i = 0; i < 20; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'float-heart';
      el.textContent = floatEmojis[Math.floor(Math.random() * floatEmojis.length)];
      const size = 14 + Math.random() * 30;
      el.style.fontSize = size + 'px';
      el.style.left = Math.random() * 100 + 'vw';
      const dur = 8 + Math.random() * 12;
      el.style.animationDuration = dur + 's';
      el.style.animationDelay = -(Math.random() * dur) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), dur * 1000 + 1000);
    }, i * 50);
  }
</script>
</body>
</html>
