<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 Hearts</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0d0008;
    --pink-1: #ff2d78;
    --pink-2: #ff6eb4;
    --pink-3: #ffb3d9;
    --pink-4: #ff4fa3;
    --violet: #c92b8c;
    --deep: #6e003a;
    --white: #fff0f5;
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    overflow: hidden;
    cursor: none;
    font-family: 'Lato', sans-serif;
    color: var(--white);
  }

  /* Gradient background orbs */
  .bg-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
    animation: orbFloat 8s ease-in-out infinite;
  }
  .bg-orb.a { width: 500px; height: 500px; background: radial-gradient(circle, #6e003a88, transparent); top: -100px; left: -100px; animation-delay: 0s; }
  .bg-orb.b { width: 400px; height: 400px; background: radial-gradient(circle, #c92b8c55, transparent); top: 40%; right: -80px; animation-delay: -3s; }
  .bg-orb.c { width: 350px; height: 350px; background: radial-gradient(circle, #ff2d7833, transparent); bottom: -60px; left: 30%; animation-delay: -5s; }

  @keyframes orbFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -40px) scale(1.05); }
    66% { transform: translate(-20px, 20px) scale(0.95); }
  }

  /* Canvas for particle hearts */
  #canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
    pointer-events: none;
  }

  /* Center content */
  .center {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    text-align: center;
    pointer-events: none;
    user-select: none;
  }

  .big-heart {
    font-size: 120px;
    line-height: 1;
    display: block;
    animation: bigPulse 1.6s ease-in-out infinite;
    filter: drop-shadow(0 0 40px #ff2d78cc);
  }

  @keyframes bigPulse {
    0%, 100% { transform: scale(1); filter: drop-shadow(0 0 40px #ff2d78cc); }
    50% { transform: scale(1.12); filter: drop-shadow(0 0 70px #ff6eb4ff); }
  }

  .title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 4rem);
    font-weight: 700;
    background: linear-gradient(135deg, var(--pink-3), var(--pink-1), var(--violet));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-top: 16px;
    letter-spacing: 0.04em;
  }

  .subtitle {
    font-size: 1rem;
    font-weight: 300;
    color: var(--pink-3);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-top: 8px;
    opacity: 0.75;
  }

  /* Click hint */
  .hint {
    position: fixed;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-size: 0.8rem;
    color: var(--pink-3);
    opacity: 0.5;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    animation: fadeHint 3s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes fadeHint {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.7; }
  }

  /* Custom cursor */
  #cursor {
    position: fixed;
    width: 28px; height: 28px;
    pointer-events: none;
    z-index: 9999;
    font-size: 22px;
    transform: translate(-50%, -50%);
    transition: transform 0.08s ease;
    will-change: transform;
  }

  /* Floating static hearts in the background */
  .float-heart {
    position: fixed;
    pointer-events: none;
    z-index: 2;
    animation: floatUp linear infinite;
    opacity: 0;
  }

  @keyframes floatUp {
    0% { transform: translateY(110vh) rotate(0deg) scale(0.5); opacity: 0; }
    10% { opacity: 0.8; }
    90% { opacity: 0.3; }
    100% { transform: translateY(-20vh) rotate(360deg) scale(1.2); opacity: 0; }
  }

  /* Click burst hearts */
  .burst-heart {
    position: fixed;
    pointer-events: none;
    z-index: 100;
    font-size: 28px;
    animation: burstOut 0.9s ease-out forwards;
  }

  @keyframes burstOut {
    0% { opacity: 1; transform: translate(0, 0) scale(0.5); }
    60% { opacity: 0.9; }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(1.4); }
  }

  /* 10번 클릭 메시지 */
  #love-message {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 999;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    background: rgba(13, 0, 8, 0.7);
    backdrop-filter: blur(6px);
  }
  #love-message.show {
    display: flex;
    animation: msgFadeIn 0.5s ease forwards;
  }
  @keyframes msgFadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .msg-hearts {
    font-size: 80px;
    animation: msgHeartPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  }
  @keyframes msgHeartPop {
    0% { transform: scale(0); }
    70% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }
  .msg-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 8vw, 6rem);
    font-weight: 700;
    background: linear-gradient(135deg, #ffb3d9, #ff2d78, #c92b8c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-top: 20px;
    opacity: 0;
    animation: msgTextSlide 0.7s 0.3s ease forwards;
    text-align: center;
    filter: drop-shadow(0 0 30px #ff2d78aa);
  }
  @keyframes msgTextSlide {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg-close {
    margin-top: 40px;
    opacity: 0;
    animation: msgTextSlide 0.7s 0.7s ease forwards;
    font-size: 0.85rem;
    color: #ffb3d9;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    cursor: pointer;
    pointer-events: all;
    border: 1px solid #ff2d7866;
    padding: 10px 28px;
    border-radius: 50px;
    transition: background 0.2s, border-color 0.2s;
  }
  .msg-close:hover {
    background: #ff2d7822;
    border-color: #ff2d78;
  }

  /* 카운터 표시 */
  #click-counter {
    position: fixed;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    gap: 6px;
    pointer-events: none;
  }
  .counter-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #ff2d7844;
    border: 1px solid #ff2d7888;
    transition: background 0.3s, transform 0.3s;
  }
  .counter-dot.filled {
    background: #ff2d78;
    border-color: #ff6eb4;
    transform: scale(1.3);
    box-shadow: 0 0 8px #ff2d78;
  }

  /* 2단계: 쩩쮸 YES/NO 화면 */
  #jjekjju-screen {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 999;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    background: rgba(13, 0, 8, 0.85);
    backdrop-filter: blur(8px);
  }
  #jjekjju-screen.show { display: flex; animation: msgFadeIn 0.5s ease forwards; }
  .jj-emoji { font-size: 70px; margin-bottom: 16px; animation: msgHeartPop 0.5s cubic-bezier(0.175,0.885,0.32,1.275) forwards; }
  .jj-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 5vw, 3.8rem);
    font-weight: 700;
    background: linear-gradient(135deg, #ffb3d9, #ff2d78, #c92b8c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
    animation: msgTextSlide 0.6s 0.2s ease both;
    opacity: 0;
  }
  .jj-buttons {
    margin-top: 52px;
    display: flex;
    gap: 36px;
    align-items: center;
  }
  .btn-no {
    font-size: 1.1rem;
    font-family: 'Lato', sans-serif;
    letter-spacing: 0.2em;
    padding: 14px 44px;
    border-radius: 50px;
    border: 2px solid #ff6eb4;
    background: transparent;
    color: #ffb3d9;
    cursor: pointer;
    pointer-events: all;
    transition: background 0.2s, transform 0.15s;
    opacity: 0;
    animation: msgTextSlide 0.7s 0.6s ease forwards;
  }
  .btn-no:hover { background: #ff2d7833; transform: scale(1.06); }

  /* YES 버튼: 마우스 피해 떠다님 */
  #btn-yes {
    position: fixed;
    font-size: 1.1rem;
    font-family: 'Lato', sans-serif;
    letter-spacing: 0.2em;
    padding: 14px 44px;
    border-radius: 50px;
    border: 2px solid #ff2d78;
    background: linear-gradient(135deg, #ff2d7833, #c92b8c22);
    color: #fff0f5;
    cursor: none;
    pointer-events: none;
    display: none;
    z-index: 1001;
    white-space: nowrap;
    box-shadow: 0 0 24px #ff2d7855;
  }
  #btn-yes.show { display: block; }

  /* NO 클릭 후 */
  #no-response {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 1002;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    background: rgba(13,0,8,0.92);
    backdrop-filter: blur(10px);
  }
  #no-response.show { display: flex; animation: msgFadeIn 0.4s ease forwards; }
  .no-resp-emoji { font-size: 80px; animation: msgHeartPop 0.5s cubic-bezier(0.175,0.885,0.32,1.275) forwards; }
  .no-resp-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.5rem, 4.5vw, 3.2rem);
    font-weight: 700;
    background: linear-gradient(135deg, #fff0f5, #ff6eb4, #ff2d78);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
    opacity: 0;
    margin-top: 20px;
    animation: msgTextSlide 0.6s 0.2s ease forwards;
  }
  .no-resp-close {
    margin-top: 40px;
    font-size: 0.8rem;
    color: #ffb3d9;
    letter-spacing: 0.25em;
    cursor: pointer;
    pointer-events: all;
    border: 1px solid #ff2d7866;
    padding: 10px 28px;
    border-radius: 50px;
    text-transform: uppercase;
    transition: background 0.2s;
    opacity: 0;
    animation: msgTextSlide 0.7s 0.8s ease forwards;
  }
  .no-resp-close:hover { background: #ff2d7822; }

</style>
</head>
<body>

<div class="bg-orb a"></div>
<div class="bg-orb b"></div>
<div class="bg-orb c"></div>

<canvas id="canvas"></canvas>

<div id="cursor">💗</div>

<div class="center">
  <span class="big-heart">💖</span>
  <div class="title">Love is Everywhere</div>
  <div class="subtitle">클릭하면 하트가 터져요 ✨</div>
</div>

<div class="hint">♥ Click anywhere ♥</div>

<!-- 1단계: 오라방 사랑해 -->
<div id="love-message">
  <div class="msg-hearts">💖💕💖</div>
  <div class="msg-text">오라방 사랑해 💗</div>
  <div class="msg-close" onclick="goToStage2()">다음단계 →</div>
</div>

<!-- 클릭 카운터 도트 -->
<div id="click-counter">
  <div class="counter-dot" id="dot-1"></div>
  <div class="counter-dot" id="dot-2"></div>
  <div class="counter-dot" id="dot-3"></div>
  <div class="counter-dot" id="dot-4"></div>
  <div class="counter-dot" id="dot-5"></div>
  <div class="counter-dot" id="dot-6"></div>
  <div class="counter-dot" id="dot-7"></div>
  <div class="counter-dot" id="dot-8"></div>
  <div class="counter-dot" id="dot-9"></div>
  <div class="counter-dot" id="dot-10"></div>
</div>

<!-- 2단계: 오늘 쩩쮸하시겠습니까? -->
<div id="jjekjju-screen">
  <div class="jj-emoji">💋</div>
  <div class="jj-title">오늘 쩩쮸하시겠습니까? 😏</div>
  <div class="jj-buttons">
    <button class="btn-no" onclick="clickNo()">NO 😤</button>
  </div>
</div>

<!-- YES 버튼 (도망다님) -->
<div id="btn-yes">YES 💕</div>

<!-- NO 클릭 후 반응 -->
<div id="no-response">
  <div class="no-resp-emoji">😂💖</div>
  <div class="no-resp-text">아쉽지만💕 내맘알지?ㅋㅋㅋ~</div>
  <div class="no-resp-close" onclick="closeNoResponse()">닫기 ✕</div>
</div>



<script>
  // Custom cursor
  const cursor = document.getElementById('cursor');
  const cursorHearts = ['💗','💕','💓','💞','💖','❤️','🩷'];
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
  });

  // Canvas particle hearts
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });

  const particles = [];
  const HEART_CHARS = ['♥','♡','❤','💕','💗','💖'];
  const COLORS = ['#ff2d78','#ff6eb4','#ffb3d9','#c92b8c','#ff4fa3','#ff91cc','#e0005e'];

  class Particle {
    constructor(x, y, fromClick) {
      this.x = x ?? Math.random() * canvas.width;
      this.y = y ?? canvas.height + 20;
      this.size = fromClick ? (16 + Math.random() * 24) : (10 + Math.random() * 20);
      this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
      this.char = HEART_CHARS[Math.floor(Math.random() * HEART_CHARS.length)];
      this.vx = (Math.random() - 0.5) * (fromClick ? 4 : 1.5);
      this.vy = fromClick ? -(3 + Math.random() * 5) : -(0.5 + Math.random() * 1.5);
      this.alpha = 1;
      this.rotation = Math.random() * Math.PI * 2;
      this.rotSpeed = (Math.random() - 0.5) * 0.08;
      this.fromClick = fromClick;
      this.life = fromClick ? 0.012 : 0.004;
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      this.alpha -= this.life;
      this.rotation += this.rotSpeed;
      if (!this.fromClick) this.vx += (Math.random() - 0.5) * 0.05;
    }
    draw() {
      ctx.save();
      ctx.globalAlpha = Math.max(0, this.alpha);
      ctx.fillStyle = this.color;
      ctx.font = `${this.size}px serif`;
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rotation);
      ctx.fillText(this.char, -this.size / 2, this.size / 2);
      ctx.restore();
    }
  }

  // Spawn ambient particles
  function spawnAmbient() {
    if (particles.length < 80) {
      particles.push(new Particle());
    }
  }
  setInterval(spawnAmbient, 200);

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = particles.length - 1; i >= 0; i--) {
      particles[i].update();
      particles[i].draw();
      if (particles[i].alpha <= 0) particles.splice(i, 1);
    }
    requestAnimationFrame(animate);
  }
  animate();

  // Click: burst hearts
  let clickCount = 0;
  const TRIGGER = 10;

  // ── 1단계: 10번 클릭 → 오라방 사랑해 ──────────────
  function triggerLoveMessage() {
    // 폭발 효과 없이 바로 메시지 표시
    document.getElementById('love-message').classList.add('show');
  }

  // ── 다음단계 버튼 ────────────────────────────────
  function goToStage2() {
    document.getElementById('love-message').classList.remove('show');
    clickCount = 0;
    for (let i = 1; i <= 10; i++) document.getElementById('dot-' + i).classList.remove('filled');
    setTimeout(() => {
      document.getElementById('jjekjju-screen').classList.add('show');
      spawnYesBtn();
    }, 200);
  }

  // ── YES 버튼: 마우스 피해 도망 ─────────────────────
  let yx = 300, yy = 300;
  let yvx = 3, yvy = -2;
  let mouseX = -999, mouseY = -999;
  let yesRaf = null;
  let yesActive = false;
  const YES_FLEE = 220;
  const YES_SPEED = 11;
  const btnYes = document.getElementById('btn-yes');

  document.addEventListener('mousemove', e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });

  function spawnYesBtn() {
    yx = window.innerWidth / 2 + 80;
    yy = window.innerHeight / 2 + 40;
    yvx = 3; yvy = -2;
    btnYes.style.left = yx + 'px';
    btnYes.style.top  = yy + 'px';
    btnYes.classList.add('show');
    yesActive = true;
    yesLoop();
  }

  function yesLoop() {
    if (!yesActive) return;
    const W = window.innerWidth;
    const H = window.innerHeight;
    const BW = 140, BH = 52;

    const dx = yx - mouseX;
    const dy = yy - mouseY;
    const dist = Math.sqrt(dx*dx + dy*dy);

    if (dist < YES_FLEE) {
      const flee = (YES_FLEE - dist) / YES_FLEE;
      const nx = dx / (dist || 1);
      const ny = dy / (dist || 1);
      yvx += nx * flee * 6;
      yvy += ny * flee * 6;
    } else {
      yvx += (Math.random() - 0.5) * 0.5;
      yvy += (Math.random() - 0.5) * 0.5;
    }

    const speed = Math.sqrt(yvx*yvx + yvy*yvy);
    if (speed > YES_SPEED) { yvx = (yvx/speed)*YES_SPEED; yvy = (yvy/speed)*YES_SPEED; }
    if (speed < 1.5) { yvx += (Math.random()-0.5)*2; yvy += (Math.random()-0.5)*2; }

    yx += yvx;
    yy += yvy;

    if (yx < 10)        { yx = 10;        yvx =  Math.abs(yvx); }
    if (yx > W - BW)    { yx = W - BW;    yvx = -Math.abs(yvx); }
    if (yy < 10)        { yy = 10;        yvy =  Math.abs(yvy); }
    if (yy > H - BH)    { yy = H - BH;    yvy = -Math.abs(yvy); }

    btnYes.style.left = yx + 'px';
    btnYes.style.top  = yy + 'px';
    yesRaf = requestAnimationFrame(yesLoop);
  }

  // ── NO 클릭 ──────────────────────────────────────
  function clickNo() {
    yesActive = false;
    cancelAnimationFrame(yesRaf);
    document.getElementById('jjekjju-screen').classList.remove('show');
    btnYes.classList.remove('show');
    document.getElementById('no-response').classList.add('show');
  }

  function closeNoResponse() {
    document.getElementById('no-response').classList.remove('show');
  }

  document.addEventListener('click', e => {
    if (document.getElementById('love-message').classList.contains('show')) return;
    if (document.getElementById('jjekjju-screen').classList.contains('show')) return;
    if (document.getElementById('no-response').classList.contains('show')) return;

    clickCount++;
    if (clickCount <= 10) {
      document.getElementById('dot-' + clickCount).classList.add('filled');
    }
    if (clickCount === TRIGGER) {
      triggerLoveMessage();
      return;
    }

    const count = 14;
    for (let i = 0; i < count; i++) {
      particles.push(new Particle(e.clientX, e.clientY, true));
    }
    for (let i = 0; i < 8; i++) {
      const el = document.createElement('div');
      el.className = 'burst-heart';
      const angle = (i / 8) * Math.PI * 2;
      const dist = 60 + Math.random() * 60;
      el.style.left = e.clientX + 'px';
      el.style.top = e.clientY + 'px';
      el.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
      el.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
      el.textContent = cursorHearts[Math.floor(Math.random() * cursorHearts.length)];
      el.style.fontSize = (18 + Math.random() * 20) + 'px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 950);
    }
    cursor.textContent = cursorHearts[Math.floor(Math.random() * cursorHearts.length)];
    cursor.style.transform = 'translate(-50%,-50%) scale(1.6)';
    setTimeout(() => {
      cursor.style.transform = 'translate(-50%,-50%) scale(1)';
      cursor.textContent = '💗';
    }, 300);
  });

  // Floating DOM hearts (behind canvas)
  const floatEmojis = ['💖','💗','💕','💓','💞','❤️','🩷','💝','💘','💟'];
  function spawnFloatHeart() {
    const el = document.createElement('div');
    el.className = 'float-heart';
    el.textContent = floatEmojis[Math.floor(Math.random() * floatEmojis.length)];
    const size = 14 + Math.random() * 30;
    el.style.fontSize = size + 'px';
    el.style.left = Math.random() * 100 + 'vw';
    const dur = 8 + Math.random() * 12;
    el.style.animationDuration = dur + 's';
    el.style.animationDelay = '0s';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), dur * 1000);
  }
  setInterval(spawnFloatHeart, 400);

  // Spawn a few immediately
  for (let i = 0; i < 20; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'float-heart';
      el.textContent = floatEmojis[Math.floor(Math.random() * floatEmojis.length)];
      const size = 14 + Math.random() * 30;
      el.style.fontSize = size + 'px';
      el.style.left = Math.random() * 100 + 'vw';
      const dur = 8 + Math.random() * 12;
      el.style.animationDuration = dur + 's';
      el.style.animationDelay = -(Math.random() * dur) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), dur * 1000 + 1000);
    }, i * 50);
  }
</script>
</body>
</html>
